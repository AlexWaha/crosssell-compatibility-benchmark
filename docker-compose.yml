# AVTC — db + typesense + redis + engine + worker + api.
# Per-service Dockerfiles (engine/Dockerfile, worker/Dockerfile, api/Dockerfile); arq/Redis queue; no shared common lib.
services:
  db:
    image: mysql:8.0
    container_name: avtc_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: secret
      MYSQL_DATABASE: avtc_catalog
    ports: ["3307:3306"]
    volumes: ["./data/mysql:/var/lib/mysql"]
    networks: [avtc_net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  typesense:
    image: typesense/typesense:26.0
    container_name: avtc_typesense
    command: "--data-dir /data --api-key xyz --enable-cors"
    ports: ["7108:8108"]
    volumes: ["./data/typesense:/data"]
    networks: [avtc_net]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8108"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: avtc_redis
    command: "redis-server --save 60 1 --appendonly yes"
    volumes: ["./data/redis:/data"]
    networks: [avtc_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    image: avtc_engine
    container_name: avtc_engine
    command: uvicorn server:app --host 0.0.0.0 --port 9000
    env_file: ["./.env"]
    depends_on:
      db: { condition: service_healthy }
      typesense: { condition: service_healthy }
    extra_hosts: ["host.docker.internal:host-gateway"]
    volumes:
      - ./engine/src:/src
      - ./project/dataset:/dataset:ro
      - ./project/docs:/docs:rw
    networks: [avtc_net]
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: avtc_worker
    container_name: avtc_worker
    command: arq worker_settings.WorkerSettings
    env_file: ["./.env"]
    depends_on:
      redis: { condition: service_healthy }
      db: { condition: service_healthy }
      engine: { condition: service_started }
    volumes:
      - ./worker/src:/src
    networks: [avtc_net]
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: avtc_api
    container_name: avtc_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: ["./.env"]
    depends_on:
      db: { condition: service_healthy }
      typesense: { condition: service_healthy }
      engine: { condition: service_started }
    ports: ["8000:8000"]
    volumes:
      - ./api/src:/src
      - ./project/dataset/images:/images:ro
      - ./frontend:/frontend:ro
    networks: [avtc_net, shared_infra]
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

networks:
  avtc_net:
    driver: bridge
  shared_infra:
    external: true
